<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Nexus Web Tools</title>
  <meta name="description" content="Contact Nexus Web Tools – send a message via Formspree. No public email address is shown.">
  <link rel="canonical" href="https://nexuswebtools.com/contact/">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Contact Nexus Web Tools",
    "description": "Contact form for Nexus Web Tools using Formspree.",
    "url": "https://nexuswebtools.com/contact/"
  }
  </script>
  <link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/nav.css">
  <link rel="stylesheet" href="/policy.css">
</head>
<body>
  <header class="ribbon">
  <div class="ribbon-inner">
    <button class="hamburger" aria-label="Open menu">
      <svg class="icon-open" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      <svg class="icon-close" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="brand"><a href="/" style="text-decoration:none;color:inherit">🧰 Nexus Web Tools</a></div>
    <nav>
      <a href="/">Home</a>
      <a href="/#tools">Tools</a>
      <a href="#faq">FAQ</a>
    </nav>
    <div class="ribbon-search">
      <button class="ribbon-search-btn" aria-label="Search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
      <input type="text" placeholder="Search tools…" autocomplete="off">
    </div>
  </div>
  <div class="scroll-bar"><div class="scroll-bar-fill"></div></div>
</header>

  <main class="container">
    <h1>Contact Us</h1>
    <p>We typically respond within 48 hours.</p>
    <form action="https://formspree.io/f/xkolndzv" method="POST">
      <input type="text" name="_gotcha" style="display:none">
      <input type="hidden" name="_next" value="https://nexuswebtools.com/contact/">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="subject">Subject</label>
      <select id="subject" name="subject" required>
        <option value="General Enquiry">General Enquiry</option>
        <option value="Bug Report">Bug Report</option>
        <option value="Feature Request">Feature Request</option>
        <option value="Other">Other</option>
      </select>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </main>

  <footer class="site-footer">
    <p>Related: <a href="https://concrete-calcs.com/">Concrete Calculator</a> | <a href="/compound-interest/">Compound Interest</a> | <a href="/unit-converter/">Unit Converter</a> | <a href="/s-curve/">S-Curve</a> | <a href="/mortgage/">Mortgage</a></p>
    <p><a href="/privacy/">Privacy</a> | <a href="/terms/">Terms</a> | <a href="/about/">About</a> | <a href="/contact/">Contact</a></p>
    <p>&copy; 2026 Nexus Web Tools</p>
  </footer>
  <script src="/scroll-bar.js" defer></script>
<script src="/nav.js" defer></script>
</body>
</html>
